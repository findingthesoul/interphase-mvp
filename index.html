<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Interphase" />
<meta name="theme-color" content="#F6F6F7" />
<title>Interphase</title>
<link rel="icon" type="image/svg+xml" href="https://findingthesoul.github.io/interphase/favicon.svg" />
<link rel="apple-touch-icon" href="https://findingthesoul.github.io/interphase/favicon.svg" />
<link rel="manifest" href="/manifest.webmanifest" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" />

<style>
  /* Providence Sans — the display face from the pitch deck */
  @font-face {
    font-family: "Providence Sans";
    src: url("https://findingthesoul.github.io/interphase/fonts/ProvidenceSans-Regular.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --paper: #FFFFFF;
    --paper-soft: #F6F6F7;
    --ink: #1A1A1C;
    --ink-soft: #3A3532;
    --ink-mute: rgba(26,26,28,.55);
    --ink-faint: rgba(26,26,28,.28);
    --rule: rgba(26,26,28,.12);
    --rule-soft: rgba(26,26,28,.06);
    --klein: #002FA7;
    --klein-ink: #001F6F;
    --klein-soft-16: rgba(0,47,167,.16);
    --klein-soft-10: rgba(0,47,167,.10);
    --klein-soft-05: rgba(0,47,167,.05);

    --serif:   "Fraunces", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --display: "Providence Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --sans:    -apple-system, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
    --mono:    "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper-soft);
    color: var(--ink);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overscroll-behavior: none;
    height: 100%;
    -webkit-user-select: none;
    user-select: none;
  }
  body { overflow: hidden; }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    position: relative;
    background: var(--paper-soft);
  }

  /* ========================================================
     SCREEN A — ENTRY (wordmark · mandala · REFLECT)
     ======================================================== */
  .entry {
    position: absolute;
    inset: 0;
    padding: calc(var(--safe-top) + 72px) 36px calc(var(--safe-bottom) + 56px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    background: var(--paper-soft);
    z-index: 5;
    opacity: 1;
    transition: opacity 0.8s ease;
  }
  .entry.hidden { opacity: 0; pointer-events: none; }
  .entry-wordmark { width: min(62vw, 240px); height: auto; display: block; }
  .entry-wordmark img { width: 100%; height: auto; display: block; }
  .entry-mandala {
    width: min(68vw, 280px);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: slow-rotate 120s linear infinite;
  }
  .entry-mandala img { width: 100%; height: 100%; object-fit: contain; }
  @keyframes slow-rotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .entry-reflect {
    appearance: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 20px 32px;
    font-family: var(--display);
    font-weight: 400;
    font-size: 26px;
    letter-spacing: 0.02em;
    color: var(--ink);
    text-transform: uppercase;
    transition: color 0.2s ease, transform 0.1s ease;
  }
  .entry-reflect:active { transform: scale(0.97); color: var(--klein); }

  /* ========================================================
     SCREEN B — NUCLEUS
     Two states driven by body.chat-open:
       - closed: orb centred, chevron (∧) at bottom to open
       - open:   orb top, rule, chevron (∨) below, chat panel
     ======================================================== */
  .nucleus {
    display: flex;
    flex-direction: column;
    height: 100%;
    opacity: 0;
    transition: opacity 0.8s ease 0.2s;
    pointer-events: none;
  }
  .nucleus.revealed { opacity: 1; pointer-events: auto; }

  /* ---- Top bar ---- */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 14px 24px 4px;
    flex-shrink: 0;
  }
  .asterisk-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 300;
    color: var(--ink);
    padding: 8px 10px;
    line-height: 1;
    transition: color 0.2s ease, transform 0.1s ease;
  }
  .asterisk-btn:active { transform: scale(0.9); color: var(--klein); }

  /* ---- Orb wrap ---- */
  .orb-wrap {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 0;
    min-height: 220px;
    transition: flex-basis 0.5s ease, min-height 0.5s ease, padding 0.5s ease;
  }
  body.chat-open .orb-wrap {
    flex: 0 0 auto;
    min-height: 160px;
    padding: 18px 0 10px;
  }

  /* ---- Orb (button) ----
     Three states, all mutually exclusive:
       (no class)  IDLE     — fixed dot, faint halo, absolutely still
       .listening           — dot + expanding KLEIN BLUE circles (stone in water)
       .speaking            — dot + expanding GREY circles (same rhythm, different colour)
     The orb uses --orb-color / --orb-soft vars so changing the state
     recolours the dot, rings, and halo together in one transition.
  */
  .orb {
    position: relative;
    width: 84px; height: 84px;
    background: none;
    border: none;
    padding: 0;
    pointer-events: none; /* ambient status light, not a button */
    --orb-color: var(--klein);
    --orb-soft: var(--klein-soft-10);
    --orb-shadow: rgba(0,47,167,0.28);
  }
  /* While IP is speaking, let the user tap the orb to interrupt. */
  .orb.speaking { pointer-events: auto; cursor: pointer; }
  body.chat-open .orb { width: 62px; height: 62px; transition: width 0.5s ease, height 0.5s ease; }

  /* IP speaking uses a warm mid-grey — clearly distinct from Klein. */
  .orb.speaking {
    --orb-color: #FFDD00;
    --orb-soft: rgba(255,221,0,0.18);
    --orb-shadow: rgba(255,221,0,0.38);
  }

  .orb .dot {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--orb-color);
    z-index: 3;
    box-shadow: 0 8px 28px var(--orb-shadow);
    transition: background 0.45s ease, box-shadow 0.45s ease;
  }
  .orb .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--orb-color);
    opacity: 0;
    transform-origin: center;
    z-index: 1;
    pointer-events: none;
    transition: background 0.45s ease;
  }
  .orb .ring-idle {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: var(--orb-soft);
    z-index: 0;
    opacity: 0.45;
    pointer-events: none;
    transition: background 0.45s ease, opacity 0.4s ease;
  }

  /* LISTENING — stone-in-water Klein ripples */
  .orb.listening .ring { animation: ring-out 2.4s ease-out infinite; }
  .orb.listening .ring:nth-child(2) { animation-delay: 0s; }
  .orb.listening .ring:nth-child(3) { animation-delay: 0.80s; }
  .orb.listening .ring:nth-child(4) { animation-delay: 1.60s; }

  /* SPEAKING — stone-in-water grey ripples (slightly slower, wider cadence) */
  .orb.speaking .ring { animation: ring-out 2.9s ease-out infinite; }
  .orb.speaking .ring:nth-child(2) { animation-delay: 0s; }
  .orb.speaking .ring:nth-child(3) { animation-delay: 0.96s; }
  .orb.speaking .ring:nth-child(4) { animation-delay: 1.93s; }

  @keyframes ring-out {
    0%   { opacity: 0.34; transform: scale(1); }
    65%  { opacity: 0.08; }
    100% { opacity: 0;    transform: scale(3.4); }
  }

  /* ---- Chat handle (closed state, bottom) ---- */
  .handle-closed {
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    padding: 18px 0 calc(28px + var(--safe-bottom));
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 300;
    color: var(--klein);
    line-height: 1;
    text-align: center;
  }
  body.chat-open .handle-closed { display: none; }
  .handle-closed:active { transform: scale(0.92); }

  /* ---- Chat panel (open state) ---- */
  .chat-panel {
    flex: 0 0 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: flex-basis 0.5s ease, opacity 0.3s ease 0.1s;
  }
  body.chat-open .chat-panel {
    flex: 1 1 auto;
    opacity: 1;
    pointer-events: auto;
  }

  .chat-rule {
    height: 1px;
    background: var(--rule);
    margin: 0 22px;
    flex-shrink: 0;
  }
  .handle-open {
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0 4px;
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 300;
    color: var(--klein);
    line-height: 1;
    text-align: center;
  }
  .handle-open:active { transform: scale(0.92); }

  /* ---- Conversation ---- */
  main.conversation {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 30px 20px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    position: relative;
  }
  main.conversation::-webkit-scrollbar { display: none; }

  .message {
    margin: 0 0 22px;
    -webkit-user-select: text;
    user-select: text;
    font-family: var(--serif);
    font-weight: 300;
    line-height: 1.4;
    letter-spacing: 0.002em;
    text-wrap: pretty;
  }
  .message.ai {
    font-size: 22px;
    color: var(--klein);
    text-align: left;
  }
  .message.user {
    font-size: 20px;
    color: var(--ink);
    text-align: right;
    margin-left: 15%;
  }
  .message.ai .cursor {
    display: inline-block;
    width: 2px;
    height: 0.9em;
    background: var(--klein);
    vertical-align: -2px;
    margin-left: 3px;
    animation: blink 0.9s steps(2, start) infinite;
  }
  @keyframes blink { to { visibility: hidden; } }

  .repeat-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 10px;
    width: 28px; height: 28px;
    vertical-align: middle;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 50%;
    cursor: pointer;
    color: var(--klein);
    opacity: 0.45;
    padding: 0;
    transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .repeat-btn:hover  { opacity: 1; background: var(--klein-soft-05); border-color: var(--klein-soft-16); }
  .repeat-btn:active { transform: rotate(-60deg) scale(0.94); opacity: 1; }

  /* ---- Text input ---- */
  footer.input-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 22px 14px;
    background: var(--paper-soft);
    border-top: 1px solid var(--rule-soft);
  }
  .text-input {
    flex: 1;
    appearance: none;
    -webkit-appearance: none;
    border: none;
    background: transparent;
    color: var(--ink);
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.002em;
    padding: 10px 4px;
    outline: none;
    -webkit-user-select: text;
    user-select: text;
    min-width: 0;
    border-bottom: 1px solid transparent;
    transition: border-bottom-color 0.2s ease;
  }
  .text-input:focus { border-bottom-color: var(--klein); }
  .text-input::placeholder { color: var(--ink-faint); font-style: italic; }
  .send-btn {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--rule);
    background: var(--ink);
    color: var(--paper-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    transition: transform 0.1s ease, opacity 0.2s ease;
  }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { opacity: 0.15; cursor: default; background: transparent; color: var(--ink); }

  /* ---- Settings overlay ---- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(26,26,28,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 40;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .settings-card {
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    width: 100%;
    max-width: 320px;
    padding: 26px 22px 20px;
    position: relative;
  }
  .settings-card h3 {
    font-family: var(--display);
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin: 0 0 18px;
    color: var(--ink);
  }
  .settings-close {
    position: absolute;
    top: 12px; right: 14px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--serif);
    font-size: 24px;
    color: var(--ink-mute);
    line-height: 1;
    padding: 4px 6px;
  }
  .settings-item {
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    border-top: 1px solid var(--rule-soft);
    cursor: pointer;
    padding: 14px 4px;
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 300;
    color: var(--ink);
    text-transform: lowercase;
  }
  .settings-item:last-child { border-bottom: 1px solid var(--rule-soft); }
  .settings-item:active { color: var(--klein); }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    bottom: calc(110px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 16px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
    z-index: 30;
    max-width: 82%;
    text-align: center;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 380px) {
    .message.ai    { font-size: 20px; }
    .message.user  { font-size: 18px; }
    .entry-reflect { font-size: 22px; }
    .orb { width: 72px; height: 72px; }
    body.chat-open .orb { width: 56px; height: 56px; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- ============== ENTRY ============== -->
  <section class="entry" id="entry">
    <div class="entry-wordmark">
      <img src="/assets/wordmark.svg" alt="interphase" />
    </div>
    <div class="entry-mandala">
      <img src="/assets/mandala.svg" alt="" />
    </div>
    <button class="entry-reflect" id="entry-reflect">REFLECT</button>
  </section>

  <!-- ============== NUCLEUS ============== -->
  <section class="nucleus" id="nucleus">

    <header class="top-bar">
      <button class="asterisk-btn" id="settings-btn" title="settings" aria-label="settings">*</button>
    </header>

    <div class="orb-wrap">
      <div class="orb" id="orb" role="status" aria-live="polite" aria-label="interphase status">
        <div class="ring-idle"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="dot"></div>
      </div>
    </div>

    <button class="handle-closed" id="handle-closed" aria-label="open conversation">∧</button>

    <div class="chat-panel">
      <div class="chat-rule"></div>
      <button class="handle-open" id="handle-open" aria-label="close conversation">∨</button>
      <main class="conversation" id="conversation"></main>
      <footer class="input-bar">
        <input class="text-input" id="text-input" type="text" placeholder="or write it" autocomplete="off" autocorrect="on" spellcheck="true" />
        <button class="send-btn" id="send-btn" aria-label="send" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </footer>
    </div>

  </section>
</div>

<!-- Settings -->
<div class="overlay" id="settings-overlay">
  <div class="settings-card">
    <button class="settings-close" id="settings-close" aria-label="close">×</button>
    <h3>settings</h3>
    <button class="settings-item" id="settings-reset">begin again</button>
    <button class="settings-item" id="settings-signout">sign out</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Interphase — Nucleus (client)
   ============================================================ */

const API_REFLECT = "/api/reflect";
const API_SPEAK   = "/api/speak";
const API_LOG     = "/api/log";

const state = {
  sessionId: null,
  signedIn: false,
  chatOpen: false,
  messages: [],
  streaming: false,
  voice: null,
  firstSentenceSpoken: false,
  spokenUpTo: 0,
  ttsAvailable: true,       // flipped to false on first failure, falls back to browser voice
  conversationActive: false,// set true after REFLECT — enables continuous listening loop
  lastAssistantText: null,  // last AI reply, for repeat button
};

/* Turn-taking config */
const SILENCE_TIMEOUT_MS = 5000;                              // 5s of silence ends turn
const TRIGGER_WORDS = ["over", "done", "finished", "go ahead"]; // end-of-phrase triggers

const el = {
  entry:          document.getElementById("entry"),
  entryReflect:   document.getElementById("entry-reflect"),
  nucleus:        document.getElementById("nucleus"),
  orb:            document.getElementById("orb"),
  handleClosed:   document.getElementById("handle-closed"),
  handleOpen:     document.getElementById("handle-open"),
  conversation:   document.getElementById("conversation"),
  textInput:      document.getElementById("text-input"),
  sendBtn:        document.getElementById("send-btn"),
  settingsBtn:    document.getElementById("settings-btn"),
  settingsOverlay:document.getElementById("settings-overlay"),
  settingsClose:  document.getElementById("settings-close"),
  settingsReset:  document.getElementById("settings-reset"),
  settingsSignout:document.getElementById("settings-signout"),
  toast:          document.getElementById("toast"),
};

/* ---------- Session ---------- */
function ensureSession() {
  let id = localStorage.getItem("interphase_session_id");
  if (!id) {
    id = (crypto.randomUUID && crypto.randomUUID()) ||
         (Date.now() + "-" + Math.random().toString(36).slice(2));
    localStorage.setItem("interphase_session_id", id);
  }
  state.sessionId = id;
}

/* ---------- Voice selection (fallback browser TTS) ---------- */
function pickVoice() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  const isEnglish = (v) => /^en(-|$)/i.test(v.lang);
  const priorities = [
    (v) => /\bAva\b/i.test(v.name) && /premium/i.test(v.name),
    (v) => /\bZoe\b/i.test(v.name) && /premium/i.test(v.name),
    (v) => /\bAllison\b/i.test(v.name) && /premium/i.test(v.name),
    (v) => /\bAva\b/i.test(v.name),
    (v) => /Samantha/i.test(v.name) && /enhanced|premium/i.test(v.name),
    (v) => /premium|enhanced/i.test(v.name) && isEnglish(v),
    (v) => v.name === "Samantha",
    (v) => v.name === "Daniel",
    (v) => v.lang === "en-GB",
    (v) => v.lang === "en-US",
    (v) => isEnglish(v),
    (v) => v.default,
  ];
  for (const test of priorities) {
    const hit = voices.find(test);
    if (hit) return hit;
  }
  return voices[0];
}
function warmVoices() {
  state.voice = pickVoice();
  if (!state.voice) {
    speechSynthesis.onvoiceschanged = () => { state.voice = pickVoice(); };
  }
}

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg) {
  el.toast.textContent = msg;
  el.toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.toast.classList.remove("show"), 2600);
}

/* ---------- Chat drawer ---------- */
function openChat() {
  if (state.chatOpen) return;
  state.chatOpen = true;
  document.body.classList.add("chat-open");
  setTimeout(scrollToBottom, 320);
}
function closeChat() {
  if (!state.chatOpen) return;
  state.chatOpen = false;
  document.body.classList.remove("chat-open");
}
el.handleClosed.addEventListener("click", openChat);
el.handleOpen.addEventListener("click", closeChat);

/* ---------- Messages ---------- */
function appendAiMessage() {
  openChat();
  const div = document.createElement("div");
  div.className = "message ai";
  div.innerHTML = `<span class="text"></span><span class="cursor"></span>`;
  el.conversation.appendChild(div);
  scrollToBottom();
  return div;
}
function appendUserMessage(text) {
  openChat();
  const div = document.createElement("div");
  div.className = "message user";
  div.textContent = text;
  el.conversation.appendChild(div);
  scrollToBottom();
}
function scrollToBottom() {
  requestAnimationFrame(() => {
    el.conversation.scrollTo({ top: el.conversation.scrollHeight, behavior: "smooth" });
  });
}

/* ---------- Orb state ---------- */
function orbState(s) {
  el.orb.classList.remove("speaking", "listening");
  if (s) el.orb.classList.add(s);
}

/* ============================================================
   AUDIO PIPELINE
   - Single reusable Audio element (unlocked on REFLECT tap)
   - Per-sentence TTS via /api/speak (OpenAI TTS-1 nova)
   - Queued playback; fire-and-forget parallel synthesis
   - Fallback to browser SpeechSynthesis on any failure
   ============================================================ */

let audioPlayer = null;
const audioQueue = [];  // { promise: Promise<string|null>, sentence: string }
let audioPlaying = false;

function unlockAudio() {
  if (audioPlayer) return;
  audioPlayer = new Audio();
  audioPlayer.preload = "auto";
  // Silent 44-byte WAV; playing it inside the REFLECT gesture unlocks the element.
  audioPlayer.src = "data:audio/wav;base64,UklGRhwAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YQAAAAA=";
  audioPlayer.play().catch(() => {});
  // Also warm SpeechSynthesis as a fallback
  try {
    const u = new SpeechSynthesisUtterance("");
    u.volume = 0;
    speechSynthesis.speak(u);
  } catch(_) {}
}

async function fetchTTS(text) {
  if (!state.ttsAvailable) return null;
  try {
    const resp = await fetch(API_SPEAK, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ text }),
    });
    if (!resp.ok) throw new Error("tts " + resp.status);
    const blob = await resp.blob();
    return URL.createObjectURL(blob);
  } catch (err) {
    console.warn("[interphase] TTS failed, falling back to browser voice:", err);
    state.ttsAvailable = false;
    return null;
  }
}

function playBlobUrl(url) {
  return new Promise((resolve) => {
    if (!audioPlayer) audioPlayer = new Audio();
    const done = () => { try { URL.revokeObjectURL(url); } catch(_) {}; resolve(); };
    audioPlayer.onended = done;
    audioPlayer.onerror = done;
    audioPlayer.src = url;
    audioPlayer.play().catch(done);
  });
}

function fallbackSpeak(sentence) {
  return new Promise((resolve) => {
    try {
      const u = new SpeechSynthesisUtterance(sentence);
      u.rate = 0.88;
      u.pitch = 0.95;
      if (state.voice) u.voice = state.voice;
      u.onend = resolve;
      u.onerror = resolve;
      speechSynthesis.speak(u);
    } catch (_) { resolve(); }
  });
}

async function processAudioQueue() {
  if (audioPlaying) return;
  audioPlaying = true;
  orbState("speaking");
  try {
    while (audioQueue.length > 0) {
      const item = audioQueue.shift();
      const url = await item.promise;
      if (url) await playBlobUrl(url);
      else     await fallbackSpeak(item.sentence);
    }
  } finally {
    audioPlaying = false;
    if (audioQueue.length === 0) {
      orbState(null);
      // The conversational loop: after Interphase finishes speaking,
      // automatically resume listening so the user can speak again.
      if (state.conversationActive && !state.streaming && !recognizing) {
        setTimeout(() => {
          if (state.conversationActive && !state.streaming && !recognizing && !audioPlaying) {
            startRecognition();
          }
        }, 350);
      }
    } else {
      processAudioQueue();
    }
  }
}

function speakSentence(sentence) {
  const s = (sentence || "").trim();
  if (!s) return;
  // Fire TTS request immediately (parallel), queue the promise
  const promise = fetchTTS(s);
  audioQueue.push({ promise, sentence: s });
  if (!audioPlaying) processAudioQueue();
}

function stopAllSpeech() {
  try { speechSynthesis.cancel(); } catch(_) {}
  audioQueue.length = 0;
  if (audioPlayer) {
    try { audioPlayer.pause(); } catch(_) {}
  }
  audioPlaying = false;
  orbState(null);
}

/* ---- Replay helpers ---- */
function attachRepeatButton(aiDiv, text) {
  if (!aiDiv || !text) return;
  // Don't double-attach
  if (aiDiv.querySelector(".repeat-btn")) return;
  const btn = document.createElement("button");
  btn.className = "repeat-btn";
  btn.type = "button";
  btn.setAttribute("aria-label", "repeat this question");
  btn.innerHTML =
    '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
      '<polyline points="1 4 1 10 7 10"/>' +
      '<path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>' +
    '</svg>';
  btn.addEventListener("click", (e) => {
    e.preventDefault();
    e.stopPropagation();
    replayText(text);
  });
  aiDiv.appendChild(btn);
}

function replayText(text) {
  if (!text || state.streaming) return;
  // Pause conversational loop briefly while replaying,
  // so we don't trigger a listening restart mid-playback.
  const wasActive = state.conversationActive;
  state.conversationActive = false;
  stopAllSpeech();
  if (recognizing) { try { recognition.stop(); } catch (_) {} }

  const sentences = text.match(/[^.!?…]+[.!?…]+/g) || [text];
  sentences.forEach((raw, i) => {
    const s = raw.trim();
    if (!s) return;
    if (i === 0) setTimeout(() => speakSentence(s), 250);
    else         speakSentence(s);
  });

  // Restore conversational mode so listening resumes after the replay drains.
  // Small delay lets the first speakSentence land in the queue before
  // processAudioQueue checks the flag.
  setTimeout(() => { state.conversationActive = wasActive; }, 120);
}

/* ---------- Sentence detection (unchanged rhythm) ---------- */
function checkForSentences(fullText, { force = false } = {}) {
  const re = /[.!?…](?=\s|$|["')\]])/g;
  let lastEnd = -1, m;
  re.lastIndex = state.spokenUpTo;
  while ((m = re.exec(fullText)) !== null) {
    lastEnd = m.index + 1;
  }
  if (lastEnd > state.spokenUpTo) {
    const chunk = fullText.slice(state.spokenUpTo, lastEnd);
    state.spokenUpTo = lastEnd;
    if (!state.firstSentenceSpoken) {
      state.firstSentenceSpoken = true;
      setTimeout(() => speakSentence(chunk), 400); // briefing: intentional 400ms
    } else {
      speakSentence(chunk);
    }
  } else if (force) {
    const remainder = fullText.slice(state.spokenUpTo).trim();
    if (remainder) {
      state.spokenUpTo = fullText.length;
      if (!state.firstSentenceSpoken) {
        state.firstSentenceSpoken = true;
        setTimeout(() => speakSentence(remainder), 400);
      } else {
        speakSentence(remainder);
      }
    }
  }
}

/* ============================================================
   STREAMING CONVERSATION
   ============================================================ */
async function askInterphase(userText) {
  state.messages.push({ role: "user", content: userText });
  // Stop any lingering listening / in-progress speech before we stream
  if (recognizing) { try { recognition.stop(); } catch(_) {} recognizing = false; }
  clearSilenceTimer();
  stopAllSpeech();

  let aiDiv = null;
  let textSpan = null;
  let fullText = "";
  state.firstSentenceSpoken = false;
  state.spokenUpTo = 0;
  state.streaming = true;
  updateSendEnabled();

  try {
    const resp = await fetch(API_REFLECT, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ session_id: state.sessionId, messages: state.messages }),
    });

    if (!resp.ok) {
      const errText = await resp.text().catch(() => "");
      console.error("Interphase API error:", resp.status, errText);
      toast("server error — try again");
      state.streaming = false;
      state.messages.pop();
      updateSendEnabled();
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const events = buffer.split("\n\n");
      buffer = events.pop() || "";
      for (const evt of events) {
        const lines = evt.split("\n");
        let dataLine = null;
        for (const l of lines) if (l.startsWith("data: ")) dataLine = l.slice(6);
        if (!dataLine || dataLine === "[DONE]") continue;
        let payload;
        try { payload = JSON.parse(dataLine); } catch { continue; }
        if (payload.type === "content_block_delta" &&
            payload.delta && payload.delta.type === "text_delta") {
          const tok = payload.delta.text;
          if (!aiDiv) { aiDiv = appendAiMessage(); textSpan = aiDiv.querySelector(".text"); }
          fullText += tok;
          textSpan.textContent = fullText;
          scrollToBottom();
          checkForSentences(fullText);
        } else if (payload.type === "message_stop") {
          checkForSentences(fullText, { force: true });
        }
      }
    }

    if (aiDiv) {
      const cursor = aiDiv.querySelector(".cursor");
      if (cursor) cursor.remove();
    }
    checkForSentences(fullText, { force: true });

    if (fullText.trim()) {
      const assistantText = fullText.trim();
      state.messages.push({ role: "assistant", content: assistantText });
      state.lastAssistantText = assistantText;
      if (aiDiv) attachRepeatButton(aiDiv, assistantText);
      // Fire-and-forget log to Supabase
      fetch(API_LOG, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          session_id: state.sessionId,
          user_text: userText,
          assistant_text: assistantText,
        }),
      }).catch(() => {});
    } else {
      state.messages.pop();
    }
  } catch (err) {
    console.error(err);
    toast("network interrupted");
    state.messages.pop();
  } finally {
    state.streaming = false;
    updateSendEnabled();
  }
}

/* ============================================================
   INPUT — orb push-to-talk + text fallback
   ============================================================ */
function submit(text) {
  const t = (text || "").trim();
  if (!t || state.streaming) return;
  appendUserMessage(t);
  el.textInput.value = "";
  updateSendEnabled();
  askInterphase(t);
}
el.sendBtn.addEventListener("click", () => submit(el.textInput.value));
el.textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); submit(el.textInput.value); }
});
el.textInput.addEventListener("input", updateSendEnabled);
function updateSendEnabled() {
  el.sendBtn.disabled = !el.textInput.value.trim() || state.streaming;
}

/* ============================================================
   CONVERSATIONAL TURN-TAKING
   - Continuous SpeechRecognition after REFLECT
   - Turn ends on 5s silence OR a trigger word ("over" / "done" / ...)
   - Recognition paused during AI speech, auto-resumed when done
   ============================================================ */
let silenceTimer = null;

function clearSilenceTimer() {
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
}
function armSilenceTimer() {
  clearSilenceTimer();
  if (!recognizing) return;
  silenceTimer = setTimeout(() => {
    if (recognizing && recognizedText.trim()) {
      // End of turn by silence
      try { recognition.stop(); } catch (_) {}
    }
  }, SILENCE_TIMEOUT_MS);
}

/* Strip a trailing trigger word from a transcript.
   Returns the cleaned text, or null if no trigger was found. */
function stripTriggerWord(raw) {
  const text = (raw || "").trim();
  if (!text) return null;
  for (const word of TRIGGER_WORDS) {
    // Match at end of text: "..... over" / "..... over." / "..... over!"
    const re = new RegExp("(.*?)\\b" + word.replace(/\s+/g, "\\s+") + "\\b[\\s.!?…,]*$", "i");
    const m = text.match(re);
    if (m) {
      const cleaned = m[1].replace(/[\s,.:;—-]+$/, "").trim();
      // Require at least some content before the trigger
      if (cleaned.length >= 2) return cleaned;
    }
  }
  return null;
}

/* ---- Speech recognition ---- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let recognizing = false;
let recognizedText = "";

function setupRecognition() {
  if (!SR) return null;
  const r = new SR();
  r.lang = "en-US";
  r.interimResults = true;
  r.continuous = true;
  r.onresult = (e) => {
    let interim = "", finalTxt = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalTxt += t; else interim += t;
    }
    recognizedText = (recognizedText + finalTxt).trim();
    const preview = (recognizedText + " " + interim).trim();
    el.textInput.value = preview;
    updateSendEnabled();

    // Trigger-word check on the full transcript (including interim so
    // it fires the instant the word is recognised)
    if (preview) {
      const cleaned = stripTriggerWord(preview);
      if (cleaned !== null) {
        recognizedText = cleaned;
        clearSilenceTimer();
        try { recognition.stop(); } catch (_) {}
        return;
      }
    }
    // Otherwise, reset the silence clock on any new speech
    if (finalTxt || interim) armSilenceTimer();
  };
  r.onerror = (e) => {
    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      toast("microphone permission needed");
      state.conversationActive = false;
    }
    // "no-speech" / "aborted" are fine — onend will decide whether to restart
    stopRecognition(false);
  };
  r.onend = () => {
    const wasRecognizing = recognizing;
    recognizing = false;
    clearSilenceTimer();
    const finalText = recognizedText.trim();
    recognizedText = "";
    el.textInput.value = "";

    if (!wasRecognizing) return;
    orbState(null);

    if (finalText) {
      // Captured a turn — submit it
      submit(finalText);
    } else if (
      state.conversationActive &&
      state.signedIn &&
      !state.streaming &&
      !audioPlaying
    ) {
      // Browser auto-ended (idle timeout) without capturing anything — restart listening
      setTimeout(() => {
        if (state.conversationActive && !state.streaming && !audioPlaying) {
          startRecognition();
        }
      }, 180);
    }
  };
  return r;
}

function startRecognition() {
  if (!recognition) recognition = setupRecognition();
  if (!recognition) { toast("speech input unavailable — type instead"); return; }
  if (recognizing || state.streaming || audioPlaying) return;
  try {
    recognizedText = "";
    el.textInput.value = "";
    recognition.start();
    recognizing = true;
    orbState("listening");
    if (navigator.vibrate) { try { navigator.vibrate(6); } catch (_) {} }
  } catch (err) {
    console.error(err);
  }
}

function stopRecognition(andSubmit = true) {
  if (!recognition || !recognizing) {
    clearSilenceTimer();
    return;
  }
  clearSilenceTimer();
  try { recognition.stop(); } catch (_) {}
  if (!andSubmit) {
    recognizing = false;
    orbState(null);
    recognizedText = "";
    el.textInput.value = "";
  }
}

/* Orb is an ambient status light, not a button.
   The only affordance: while IP is speaking, tap to interrupt. */
el.orb.addEventListener("click", (e) => {
  e.preventDefault();
  if (audioPlaying) stopAllSpeech();
});

/* ============================================================
   SETTINGS
   ============================================================ */
function openSettings() { el.settingsOverlay.classList.add("show"); }
function closeSettings(){ el.settingsOverlay.classList.remove("show"); }
el.settingsBtn.addEventListener("click", openSettings);
el.settingsClose.addEventListener("click", closeSettings);
el.settingsOverlay.addEventListener("click", (e) => {
  if (e.target === el.settingsOverlay) closeSettings();
});
el.settingsReset.addEventListener("click", () => {
  if (state.streaming) return;
  stopAllSpeech();
  if (recognizing) { try { recognition.stop(); } catch(_) {} }
  clearSilenceTimer();
  state.messages = [];
  state.lastAssistantText = null;
  el.conversation.innerHTML = "";
  closeSettings();
  closeChat();
  // Keep conversationActive — re-speak "ready to reflect" and resume listening
  setTimeout(() => { speakSentence("ready to reflect."); }, 250);
});
el.settingsSignout.addEventListener("click", () => {
  if (state.streaming) return;
  state.conversationActive = false;
  stopAllSpeech();
  if (recognizing) { try { recognition.stop(); } catch(_) {} }
  clearSilenceTimer();
  state.messages = [];
  state.lastAssistantText = null;
  el.conversation.innerHTML = "";
  closeSettings();
  closeChat();
  state.signedIn = false;
  el.nucleus.classList.remove("revealed");
  el.entry.classList.remove("hidden");
});

/* ============================================================
   SIGN-IN TRANSITION
   ============================================================ */
function reflect() {
  if (state.signedIn) return;
  state.signedIn = true;
  state.conversationActive = true;

  // Unlock audio on this user gesture (both HTMLAudio + SpeechSynthesis)
  unlockAudio();

  // Reveal nucleus
  el.entry.classList.add("hidden");
  el.nucleus.classList.add("revealed");

  // Speak "ready to reflect" once the transition lands.
  // When the audio queue drains, processAudioQueue() will auto-start
  // listening because state.conversationActive is now true.
  setTimeout(() => { speakSentence("ready to reflect."); }, 900);
}
el.entryReflect.addEventListener("click", reflect);

/* ============================================================
   BOOTSTRAP
   ============================================================ */
if (speechSynthesis.getVoices().length === 0) {
  speechSynthesis.onvoiceschanged = warmVoices;
} else {
  warmVoices();
}
ensureSession();
</script>
