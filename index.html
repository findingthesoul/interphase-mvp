<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Interphase" />
<meta name="theme-color" content="#FFFFFF" />
<title>Interphase</title>
<link rel="icon" type="image/svg+xml" href="https://findingthesoul.github.io/interphase/favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" />

<style>
  :root {
    --paper: #FFFFFF;
    --paper-soft: #F6F6F7;
    --ink: #1A1A1C;
    --ink-soft: #3A3532;
    --ink-mute: rgba(26,26,28,.55);
    --ink-faint: rgba(26,26,28,.28);
    --rule: rgba(26,26,28,.12);
    --rule-soft: rgba(26,26,28,.06);
    --klein: #002FA7;
    --klein-ink: #001F6F;
    --klein-soft-16: rgba(0,47,167,.16);
    --klein-soft-10: rgba(0,47,167,.10);
    --klein-soft-05: rgba(0,47,167,.05);

    --serif: "Fraunces", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --sans: -apple-system, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper-soft);
    color: var(--ink);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overscroll-behavior: none;
    height: 100%;
    -webkit-user-select: none;
    user-select: none;
  }
  body { overflow: hidden; }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    position: relative;
    background: var(--paper-soft);
  }

  /* ========================================================
     SCREEN A — ENTRY (wordmark · mandala · SIGN IN)
     ========================================================  */
  .entry {
    position: absolute;
    inset: 0;
    padding: calc(var(--safe-top) + 72px) 36px calc(var(--safe-bottom) + 56px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    background: var(--paper-soft);
    z-index: 5;
    opacity: 1;
    transition: opacity 0.8s ease;
  }
  .entry.hidden { opacity: 0; pointer-events: none; }
  .entry-wordmark { width: min(62vw, 240px); height: auto; display: block; }
  .entry-wordmark img { width: 100%; height: auto; display: block; }
  .entry-mandala {
    width: min(68vw, 280px);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: slow-rotate 120s linear infinite;
  }
  .entry-mandala img { width: 100%; height: 100%; object-fit: contain; }
  @keyframes slow-rotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .entry-signin {
    appearance: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 20px 32px;
    font-family: var(--serif);
    font-weight: 400;
    font-size: 22px;
    letter-spacing: 0.22em;
    color: var(--ink);
    text-transform: uppercase;
    transition: color 0.2s ease, transform 0.1s ease;
  }
  .entry-signin:active { transform: scale(0.97); color: var(--klein); }

  /* ========================================================
     SCREEN B — NUCLEUS (orb · conversation)
     ========================================================  */
  .nucleus {
    display: flex;
    flex-direction: column;
    height: 100%;
    opacity: 0;
    transition: opacity 0.8s ease 0.3s;
    pointer-events: none;
  }
  .nucleus.revealed { opacity: 1; pointer-events: auto; }

  /* Top bar — just the asterisk */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 14px 24px 4px;
    flex-shrink: 0;
  }
  .asterisk-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 300;
    color: var(--ink);
    padding: 8px 10px;
    line-height: 1;
    transition: color 0.2s ease, transform 0.1s ease;
  }
  .asterisk-btn:active { transform: scale(0.9); color: var(--klein); }

  /* Orb stage */
  .orb-stage {
    flex-shrink: 0;
    padding: 24px 0 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    height: 200px;
  }
  .orb {
    position: relative;
    width: 58px; height: 58px;
  }
  .orb .dot {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--klein);
    z-index: 3;
    box-shadow: 0 4px 18px rgba(0,47,167,0.22);
    transition: transform 0.3s ease;
  }
  .orb .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--klein);
    opacity: 0;
    transform-origin: center;
    z-index: 1;
  }
  .orb.active .dot { animation: dot-breathe 2.4s ease-in-out infinite; }
  .orb.active .ring {
    animation: ring-out 3.2s ease-out infinite;
  }
  .orb.active .ring:nth-child(2) { animation-delay: 0s; }
  .orb.active .ring:nth-child(3) { animation-delay: 1.07s; }
  .orb.active .ring:nth-child(4) { animation-delay: 2.14s; }

  /* Gentle idle breathing — always on, subtle */
  .orb .ring-idle {
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    background: var(--klein-soft-10);
    z-index: 0;
    animation: idle-breathe 4.8s ease-in-out infinite;
  }

  @keyframes ring-out {
    0%   { opacity: 0.18; transform: scale(1); }
    70%  { opacity: 0.06; }
    100% { opacity: 0; transform: scale(3.4); }
  }
  @keyframes dot-breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.05); }
  }
  @keyframes idle-breathe {
    0%, 100% { opacity: 0.35; transform: scale(1); }
    50%      { opacity: 0.6;  transform: scale(1.12); }
  }

  /* Rule + chevron */
  .rule {
    height: 1px;
    background: var(--rule);
    margin: 0 22px;
    flex-shrink: 0;
  }
  .chevron {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    padding: 8px 0 4px;
    font-family: var(--serif);
    font-weight: 300;
    font-size: 26px;
    color: var(--klein);
    line-height: 1;
    letter-spacing: 0;
  }

  /* ---------- Conversation ---------- */
  main.conversation {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 30px 28px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    position: relative;
  }
  main.conversation::-webkit-scrollbar { display: none; }

  .ready-state {
    text-align: left;
    font-family: var(--serif);
    font-weight: 300;
    font-size: 22px;
    line-height: 1.35;
    color: var(--klein);
    letter-spacing: 0.005em;
    margin: 18px 0 0;
    opacity: 0;
    animation: fade-in 1.2s ease 0.6s forwards;
  }
  @keyframes fade-in { to { opacity: 1; } }
  .ready-state.gone { display: none; }

  .message {
    margin: 0 0 22px;
    -webkit-user-select: text;
    user-select: text;
    font-family: var(--serif);
    font-weight: 300;
    line-height: 1.4;
    letter-spacing: 0.002em;
    text-wrap: pretty;
  }
  .message.ai {
    font-size: 22px;
    color: var(--klein);
    text-align: left;
  }
  .message.user {
    font-size: 20px;
    color: var(--ink);
    text-align: right;
    margin-left: 15%;
  }
  .message.ai .cursor {
    display: inline-block;
    width: 2px;
    height: 0.9em;
    background: var(--klein);
    vertical-align: -2px;
    margin-left: 3px;
    animation: blink 0.9s steps(2, start) infinite;
  }
  @keyframes blink { to { visibility: hidden; } }

  /* ---------- Input bar ---------- */
  footer.input-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px 16px;
    border-top: 1px solid var(--rule-soft);
    background: var(--paper-soft);
  }
  .icon-btn {
    flex-shrink: 0;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--rule);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    color: var(--ink);
    padding: 0;
  }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn.mic.recording {
    background: var(--klein);
    border-color: var(--klein);
    color: var(--paper);
    animation: recording-pulse 1.4s ease-in-out infinite;
  }
  @keyframes recording-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,47,167,0.35); }
    50%      { box-shadow: 0 0 0 10px rgba(0,47,167,0);   }
  }
  .icon-btn.send { background: var(--ink); color: var(--paper-soft); border-color: var(--ink); }
  .icon-btn.send:disabled { opacity: 0.18; cursor: default; background: transparent; color: var(--ink); border-color: var(--rule); }

  .text-input {
    flex: 1;
    appearance: none;
    -webkit-appearance: none;
    border: none;
    background: transparent;
    color: var(--ink);
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 300;
    letter-spacing: 0.002em;
    padding: 10px 4px;
    outline: none;
    -webkit-user-select: text;
    user-select: text;
    min-width: 0;
    border-bottom: 1px solid transparent;
    transition: border-bottom-color 0.2s ease;
  }
  .text-input:focus { border-bottom-color: var(--klein); }
  .text-input::placeholder { color: var(--ink-faint); font-style: italic; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    bottom: calc(110px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 16px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
    z-index: 30;
    max-width: 82%;
    text-align: center;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 380px) {
    .message.ai   { font-size: 20px; }
    .message.user { font-size: 18px; }
    .ready-state  { font-size: 20px; }
    .entry-signin { font-size: 20px; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- ============== ENTRY ============== -->
  <section class="entry" id="entry">
    <div class="entry-wordmark">
      <img src="/assets/wordmark.svg" alt="interphase" />
    </div>
    <div class="entry-mandala">
      <img src="/assets/mandala.svg" alt="" />
    </div>
    <button class="entry-signin" id="entry-signin">SIGN IN</button>
  </section>

  <!-- ============== NUCLEUS ============== -->
  <section class="nucleus" id="nucleus">
    <header class="top-bar">
      <button class="asterisk-btn" id="reset-btn" title="begin again" aria-label="begin again">*</button>
    </header>

    <div class="orb-stage">
      <div class="orb" id="orb">
        <div class="ring-idle"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="rule"></div>
    <div class="chevron">∨</div>

    <main class="conversation" id="conversation">
      <div class="ready-state" id="ready-state">ready to reflect</div>
    </main>

    <footer class="input-bar">
      <button class="icon-btn mic" id="mic-btn" aria-label="hold to speak">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="3" width="6" height="12" rx="3"/>
          <path d="M5 11a7 7 0 0 0 14 0"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
        </svg>
      </button>
      <input class="text-input" id="text-input" type="text" placeholder="or write it" autocomplete="off" autocorrect="on" spellcheck="true" />
      <button class="icon-btn send" id="send-btn" aria-label="send" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </footer>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- Interphase — Nucleus ---------- */

const API_URL = "/api/reflect";

const state = {
  sessionId: null,
  signedIn: false,
  messages: [],
  streaming: false,
  voice: null,
  firstSentenceSpoken: false,
  spokenUpTo: 0,
};

const el = {
  entry:        document.getElementById("entry"),
  entrySignin:  document.getElementById("entry-signin"),
  nucleus:      document.getElementById("nucleus"),
  orb:          document.getElementById("orb"),
  readyState:   document.getElementById("ready-state"),
  conversation: document.getElementById("conversation"),
  micBtn:       document.getElementById("mic-btn"),
  textInput:    document.getElementById("text-input"),
  sendBtn:      document.getElementById("send-btn"),
  resetBtn:     document.getElementById("reset-btn"),
  toast:        document.getElementById("toast"),
};

/* ---------- Session ---------- */
function ensureSession() {
  let id = localStorage.getItem("interphase_session_id");
  if (!id) {
    id = (crypto.randomUUID && crypto.randomUUID()) ||
         (Date.now() + "-" + Math.random().toString(36).slice(2));
    localStorage.setItem("interphase_session_id", id);
  }
  state.sessionId = id;
}

/* ---------- Voice selection ---------- */
function pickVoice() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  const priorities = [
    v => v.name === "Samantha",
    v => v.name === "Daniel",
    v => v.lang === "en-GB",
    v => v.lang === "en-US",
    v => v.default,
  ];
  for (const test of priorities) {
    const hit = voices.find(test);
    if (hit) return hit;
  }
  return voices[0];
}
function warmVoices() {
  state.voice = pickVoice();
  if (!state.voice) {
    speechSynthesis.onvoiceschanged = () => { state.voice = pickVoice(); };
  }
}

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg) {
  el.toast.textContent = msg;
  el.toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.toast.classList.remove("show"), 2600);
}

/* ---------- Message rendering ---------- */
function hideReadyState() {
  if (el.readyState && !el.readyState.classList.contains("gone")) {
    el.readyState.classList.add("gone");
  }
}
function appendAiMessage() {
  hideReadyState();
  const div = document.createElement("div");
  div.className = "message ai";
  div.innerHTML = `<span class="text"></span><span class="cursor"></span>`;
  el.conversation.appendChild(div);
  scrollToBottom();
  return div;
}
function appendUserMessage(text) {
  hideReadyState();
  const div = document.createElement("div");
  div.className = "message user";
  div.textContent = text;
  el.conversation.appendChild(div);
  scrollToBottom();
}
function scrollToBottom() {
  el.conversation.scrollTo({ top: el.conversation.scrollHeight, behavior: "smooth" });
}

/* ---------- Orb state ---------- */
function orbActive(on) {
  el.orb.classList.toggle("active", !!on);
}

/* ---------- Sentence-aware speech ---------- */
function speakSentence(sentence) {
  if (!sentence.trim()) return;
  const u = new SpeechSynthesisUtterance(sentence.trim());
  u.rate = 0.88;
  u.pitch = 0.95;
  u.volume = 1.0;
  if (state.voice) u.voice = state.voice;
  speechSynthesis.speak(u);
}
function checkForSentences(fullText, { force = false } = {}) {
  const re = /[.!?…](?=\s|$|["')\]])/g;
  let lastEnd = -1, m;
  re.lastIndex = state.spokenUpTo;
  while ((m = re.exec(fullText)) !== null) {
    lastEnd = m.index + 1;
  }
  if (lastEnd > state.spokenUpTo) {
    const chunk = fullText.slice(state.spokenUpTo, lastEnd);
    state.spokenUpTo = lastEnd;
    if (!state.firstSentenceSpoken) {
      state.firstSentenceSpoken = true;
      setTimeout(() => speakSentence(chunk), 400); // intentional 400ms
    } else {
      speakSentence(chunk);
    }
  } else if (force) {
    const remainder = fullText.slice(state.spokenUpTo).trim();
    if (remainder) {
      state.spokenUpTo = fullText.length;
      if (!state.firstSentenceSpoken) {
        state.firstSentenceSpoken = true;
        setTimeout(() => speakSentence(remainder), 400);
      } else {
        speakSentence(remainder);
      }
    }
  }
}

/* ---------- Streaming API call ---------- */
async function askInterphase(userText) {
  state.messages.push({ role: "user", content: userText });
  try { speechSynthesis.cancel(); } catch (_) {}

  // Pre-create the AI bubble slot (orb stays active through the call)
  let aiDiv = null;
  let textSpan = null;
  let fullText = "";
  state.firstSentenceSpoken = false;
  state.spokenUpTo = 0;
  state.streaming = true;
  updateSendEnabled();
  orbActive(true);

  try {
    const resp = await fetch(API_URL, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        session_id: state.sessionId,
        messages: state.messages,
      }),
    });

    if (!resp.ok) {
      const errText = await resp.text().catch(() => "");
      console.error("Interphase API error:", resp.status, errText);
      toast("server error — try again");
      state.streaming = false;
      state.messages.pop();
      orbActive(false);
      updateSendEnabled();
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const events = buffer.split("\n\n");
      buffer = events.pop() || "";

      for (const evt of events) {
        const lines = evt.split("\n");
        let dataLine = null;
        for (const l of lines) if (l.startsWith("data: ")) dataLine = l.slice(6);
        if (!dataLine) continue;
        if (dataLine === "[DONE]") continue;
        let payload;
        try { payload = JSON.parse(dataLine); } catch { continue; }

        if (payload.type === "content_block_delta" &&
            payload.delta && payload.delta.type === "text_delta") {
          const tok = payload.delta.text;
          if (!aiDiv) {
            aiDiv = appendAiMessage();
            textSpan = aiDiv.querySelector(".text");
          }
          fullText += tok;
          textSpan.textContent = fullText;
          scrollToBottom();
          checkForSentences(fullText);
        } else if (payload.type === "message_stop") {
          checkForSentences(fullText, { force: true });
        }
      }
    }

    if (aiDiv) {
      const cursor = aiDiv.querySelector(".cursor");
      if (cursor) cursor.remove();
    }
    checkForSentences(fullText, { force: true });

    if (fullText.trim()) {
      state.messages.push({ role: "assistant", content: fullText.trim() });
    } else {
      state.messages.pop();
    }
  } catch (err) {
    console.error(err);
    toast("network interrupted");
    state.messages.pop();
  } finally {
    state.streaming = false;
    updateSendEnabled();
    // Stop orb pulse once speech queue is done (not immediately — let the voice finish).
    const stopOrbWhenSilent = () => {
      if (speechSynthesis.speaking || speechSynthesis.pending) {
        setTimeout(stopOrbWhenSilent, 400);
      } else {
        orbActive(false);
      }
    };
    setTimeout(stopOrbWhenSilent, 500);
  }
}

/* ---------- Input handling ---------- */
function submit(text) {
  const t = (text || "").trim();
  if (!t || state.streaming) return;
  appendUserMessage(t);
  el.textInput.value = "";
  updateSendEnabled();
  askInterphase(t);
}
el.sendBtn.addEventListener("click", () => submit(el.textInput.value));
el.textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); submit(el.textInput.value); }
});
el.textInput.addEventListener("input", updateSendEnabled);
function updateSendEnabled() {
  el.sendBtn.disabled = !el.textInput.value.trim() || state.streaming;
}

/* ---------- Speech recognition (hold to speak) ---------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let recognizing = false;
let recognizedText = "";

function setupRecognition() {
  if (!SR) return null;
  const r = new SR();
  r.lang = "en-US";
  r.interimResults = true;
  r.continuous = true;
  r.onresult = (e) => {
    let interim = "", finalTxt = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalTxt += t; else interim += t;
    }
    recognizedText = (recognizedText + finalTxt).trim();
    el.textInput.value = (recognizedText + " " + interim).trim();
    updateSendEnabled();
  };
  r.onerror = (e) => {
    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      toast("microphone permission needed");
    }
    stopRecognition(false);
  };
  r.onend = () => {
    if (recognizing) {
      recognizing = false;
      el.micBtn.classList.remove("recording");
      const finalText = recognizedText.trim();
      recognizedText = "";
      if (finalText) submit(finalText);
    }
  };
  return r;
}
function startRecognition() {
  if (!recognition) recognition = setupRecognition();
  if (!recognition) {
    toast("speech input unavailable — type instead");
    el.textInput.focus();
    return;
  }
  if (recognizing || state.streaming) return;
  try {
    speechSynthesis.cancel();
    recognizedText = "";
    el.textInput.value = "";
    recognition.start();
    recognizing = true;
    el.micBtn.classList.add("recording");
  } catch (err) { console.error(err); }
}
function stopRecognition(andSubmit = true) {
  if (!recognition || !recognizing) return;
  try { recognition.stop(); } catch (_) {}
  if (!andSubmit) {
    recognizing = false;
    el.micBtn.classList.remove("recording");
    recognizedText = "";
    el.textInput.value = "";
  }
}
el.micBtn.addEventListener("pointerdown",  (e) => { e.preventDefault(); startRecognition(); });
el.micBtn.addEventListener("pointerup",    (e) => { e.preventDefault(); stopRecognition(true); });
el.micBtn.addEventListener("pointerleave", () => { if (recognizing) stopRecognition(true); });
el.micBtn.addEventListener("pointercancel",() => { if (recognizing) stopRecognition(false); });

/* ---------- Reset ---------- */
el.resetBtn.addEventListener("click", () => {
  if (state.streaming) return;
  try { speechSynthesis.cancel(); } catch(_) {}
  state.messages = [];
  el.conversation.innerHTML = '<div class="ready-state" id="ready-state">ready to reflect</div>';
  el.readyState = document.getElementById("ready-state");
  orbActive(false);
});

/* ---------- Sign in → Nucleus transition ---------- */
function signIn() {
  if (state.signedIn) return;
  state.signedIn = true;

  // Unlock iOS audio on the gesture
  try {
    const warm = new SpeechSynthesisUtterance("");
    warm.volume = 0;
    speechSynthesis.speak(warm);
  } catch (_) {}

  // Reveal nucleus
  el.entry.classList.add("hidden");
  el.nucleus.classList.add("revealed");

  // Speak "ready to reflect" shortly after the transition lands
  setTimeout(() => {
    if (state.voice || pickVoice()) {
      const u = new SpeechSynthesisUtterance("ready to reflect");
      u.rate = 0.84;
      u.pitch = 0.95;
      if (state.voice) u.voice = state.voice;
      speechSynthesis.speak(u);
    }
  }, 900);
}
el.entrySignin.addEventListener("click", signIn);

/* ---------- Bootstrap ---------- */
if (speechSynthesis.getVoices().length === 0) {
  speechSynthesis.onvoiceschanged = warmVoices;
} else {
  warmVoices();
}
ensureSession();
</script>
